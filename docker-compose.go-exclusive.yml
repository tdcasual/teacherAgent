services:
  api:
    build:
      context: .
      dockerfile: services/go-api/Dockerfile
    ports:
      - "${GO_EXCLUSIVE_PORT:-8000}:8080"
    environment:
      - GO_API_ADDR=:8080
      - DATABASE_URL=${DATABASE_URL:-postgres://placeholder}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
